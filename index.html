<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santé IA Tchad - L'intelligence artificielle au service de la santé pour tous</title>
    <meta name="description" content="Plateforme de santé numérique au Tchad : détection précoce des maladies, recherche de médecins, prise de rendez-vous et statistiques sanitaires.">
    
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary: #047857; /* Emerald 700 */
            --primary-light: #10b981; /* Emerald 500 */
            --secondary: #0284c7; /* Sky 600 */
            --accent: #f59e0b; /* Amber 500 */
            --background: #f8fafc; /* Slate 50 */
            --surface: #ffffff;
            --text-main: #0f172a; /* Slate 900 */
            --text-muted: #64748b; /* Slate 500 */
        }
    }

    @layer base {
        body {
            @apply bg-[var(--background)] text-[var(--text-main)] font-sans antialiased;
        }
        h1, h2, h3, h4, h5, h6 {
            @apply font-bold tracking-tight;
        }
    }

    @layer components {
        .btn-primary {
            @apply px-4 py-2 bg-[var(--primary)] text-white rounded-lg hover:bg-[var(--primary-light)] transition-colors shadow-sm font-medium flex items-center justify-center gap-2;
        }
        .btn-secondary {
            @apply px-4 py-2 bg-white text-[var(--primary)] border border-[var(--primary)] rounded-lg hover:bg-emerald-50 transition-colors shadow-sm font-medium flex items-center justify-center gap-2;
        }
        .card {
            @apply bg-[var(--surface)] rounded-xl shadow-sm border border-slate-100 p-6;
        }
        .input-field {
            @apply w-full px-4 py-2 rounded-lg border border-slate-300 focus:border-[var(--primary)] focus:ring-2 focus:ring-[var(--primary)] focus:ring-opacity-20 outline-none transition-all;
        }
    }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" src="utils/i18n.js"></script>
    <script type="text/babel" src="components/Layout.js"></script>
    <script type="text/babel" src="pages/Home.js"></script>
    <script type="text/babel" src="pages/Auth.js"></script>
    <script type="text/babel" src="pages/Diagnostic.js"></script>
    <script type="text/babel" src="pages/Doctors.js"></script>
    <script type="text/babel" src="pages/Hospitals.js"></script>
    <script type="text/babel" src="pages/AdminDashboard.js"></script>
    <script type="text/babel" src="pages/PatientDashboard.js"></script>
    <script type="text/babel" src="app.js"></script>
</body>
</html>
